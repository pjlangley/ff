name: core fragments

on:
  push:
    branches:
      - main

jobs:
  ff_node:
    runs-on: ubuntu-latest
    name: node.js
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: store solana program keys into environment variables
        run: cat program_keys.env >> $GITHUB_ENV

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: install npm dependencies
        run: npm ci

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: lint
        run: node --run lint

      - name: type check
        run: node --run tsc

      - name: format check
        run: node --run format:check

      - name: unit tests
        run: node --run test

      - name: build
        run: node --run api:build

      - name: run fastify api
        run: node --run api:dist &

      - name: bruno integration tests for fastify api
        run: node --run api:bru:fastify

  ff_python:
    runs-on: ubuntu-latest
    name: python
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: store solana program keys into environment variables
        run: cat program_keys.env >> $GITHUB_ENV

      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.10.9
          enable-cache: true
      
      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: install dependencies
        run: uv sync --frozen

      - name: lint
        run: uv run pylint ./fragments

      - name: type check
        run: uv run mypy

      - name: format check
        run: uv run ruff format --check ./fragments 
      
      - name: unit tests
        run: uv run python -m unittest -v --failfast

      - name: run fastapi api
        run: uv run python -m fragments.api &

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: install npm dependencies
        run: npm ci

      - name: bruno integration tests for fastapi
        run: node --run api:bru:fastapi
