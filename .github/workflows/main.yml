name: main

on:
  push:
    branches:
      - main

jobs:
  blockchain_checks:
    uses: ./.github/workflows/blockchain.yml

  terraform_checks:
    uses: ./.github/workflows/terraform.yml

  terraform_deploy:
    needs: [terraform_checks]
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/terraform_deploy.yml
    secrets: inherit

  docker_images:
    needs: [blockchain_checks]
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/docker.yml
    secrets: inherit

  api_checks:
    needs: [docker_images]
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/apis.yml
