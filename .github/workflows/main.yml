name: core fragments

on:
  push:
    branches:
      - main

jobs:
  ff_node_checks:
    runs-on: ubuntu-latest
    name: node.js checks
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: install npm dependencies
        run: npm ci

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: lint
        run: node --run lint

      - name: type check
        run: node --run tsc

      - name: format check
        run: node --run format:check

  ff_node_tests:
    runs-on: ubuntu-latest
    name: node.js tests
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 5s
      postgres:
        image: postgres:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: pgpass
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 5s
      solana:
        image: pjlangley/ff_solana:latest
        ports:
          - 8899:8899
          - 1024:1024
          - 1027:1027
          - 8900:8900
        # --security-opt seccomp=unconfined fixes "assertion failed: io_uring_supported()" error.
        # Agave v3 now requires io_uring for its accounts database, but GitHub Actions runs
        # containers with a seccomp profile that blocks io_uring syscalls.
        # io_uring is a relatively new (Linux 5.1+) high-performance async I/O interface.
        # Low-risk solution given this is a CI validator in an ephemeral container running "trusted" code.
        options: >-
          --security-opt seccomp=unconfined
          --health-cmd "solana cluster-version --url http://127.0.0.1:8899"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/solana_deploy

      - name: store solana program keys into environment variables
        run: cat program_keys.env >> $GITHUB_ENV

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: install npm dependencies
        run: npm ci

      - name: unit tests
        run: node --run test

      - name: build
        run: node --run api:build

      - name: run fastify api
        run: node --run api:dist &

      - name: bruno integration tests for fastify api
        run: node --run api:bru:fastify

  ff_python_checks:
    runs-on: ubuntu-latest
    name: python checks
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.10.9
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: install dependencies
        run: uv sync --frozen

      - name: lint
        run: uv run pylint ./fragments

      - name: type check
        run: uv run mypy

      - name: format check
        run: uv run ruff format --check ./fragments

  ff_python_tests:
    runs-on: ubuntu-latest
    name: python tests
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 5s
      postgres:
        image: postgres:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: pgpass
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 5s
      solana:
        image: pjlangley/ff_solana:latest
        ports:
          - 8899:8899
          - 1024:1024
          - 1027:1027
          - 8900:8900
        # --security-opt seccomp=unconfined fixes "assertion failed: io_uring_supported()" error.
        # Agave v3 now requires io_uring for its accounts database, but GitHub Actions runs
        # containers with a seccomp profile that blocks io_uring syscalls.
        # io_uring is a relatively new (Linux 5.1+) high-performance async I/O interface.
        # Low-risk solution given this is a CI validator in an ephemeral container running "trusted" code.
        options: >-
          --security-opt seccomp=unconfined
          --health-cmd "solana cluster-version --url http://127.0.0.1:8899"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/solana_deploy

      - name: store solana program keys into environment variables
        run: cat program_keys.env >> $GITHUB_ENV

      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.10.9
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: install dependencies
        run: uv sync --frozen

      - name: unit tests
        run: uv run python -m unittest -v --failfast

      - name: run fastapi api
        run: uv run python -m fragments.api &

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: install npm dependencies
        run: npm ci

      - name: bruno integration tests for fastapi
        run: node --run api:bru:fastapi
