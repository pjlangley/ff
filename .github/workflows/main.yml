name: core fragments

on:
  push:
    branches:
      - main

jobs:
  ff_node:
    runs-on: ubuntu-latest
    name: node.js
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: store solana program keys into environment variables
        run: cat program_keys.env >> $GITHUB_ENV

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: install npm dependencies
        run: npm ci

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: lint
        run: node --run lint

      - name: type check
        run: node --run tsc

      - name: format check
        run: node --run format:check

      - name: unit tests
        run: node --run test

      - name: build
        run: node --run api:build

      - name: run fastify api
        run: node --run api:dist &

      - name: bruno integration tests for fastify api
        run: node --run api:bru:fastify

  ff_python:
    runs-on: ubuntu-latest
    name: python
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: store solana program keys into environment variables
        run: cat program_keys.env >> $GITHUB_ENV

      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.10.9
          enable-cache: true
      
      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: install dependencies
        run: uv sync --frozen

      - name: lint
        run: uv run pylint ./fragments

      - name: type check
        run: uv run mypy

      - name: format check
        run: uv run ruff format --check ./fragments 
      
      - name: unit tests
        run: uv run python -m unittest -v --failfast

      - name: run fastapi api
        run: uv run python -m fragments.api &

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: install npm dependencies
        run: npm ci

      - name: bruno integration tests for fastapi
        run: node --run api:bru:fastapi

  ff_rust:
    runs-on: ubuntu-latest
    name: rust
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: store solana program keys into environment variables
        run: cat program_keys.env >> $GITHUB_ENV

      - uses: moonrepo/setup-rust@v1
        with:
          inherit-toolchain: true

      - name: lint
        run: cargo clippy -- -D warnings

      - name: format check
        run : cargo fmt -v --check

      - name: unit tests
        run: cargo test -- --test-threads=1

      - name: build
        run: cargo build --bin api

      - name: run axum api
        run: ./target/debug/api &

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: install npm dependencies
        run: npm ci

      - name: bruno integration tests for axum api
        run: node --run api:bru:axum

      - name: disk space before cleanup
        run: |
          df -h
          docker system df

      - name: Docker cleanup (frees disk space for moonrepo caching)
        run: |
          docker ps -aq | xargs -r docker rm -f
          docker images -aq | xargs -r docker rmi -f
          docker system prune -af || true

      - name: disk space after cleanup
        run: |
          df -h
          docker system df

  ff_go:
    runs-on: ubuntu-latest
    name: go
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: store solana program keys into environment variables
        run: cat program_keys.env >> $GITHUB_ENV

      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache: true
          cache-dependency-path: go.work.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          version-file: .golangci-lint-version
          install-only: true

      - name: install dependencies
        working-directory: ./fragments
        run: go mod tidy

      - name: lint
        run: golangci-lint run -v ./fragments/...

      - name: format check
        run: test -z $(gofmt -l ./fragments)

      - name: unit tests
        run: go test -v -p 1 ./fragments/...

      - name: build
        run: go build -v -o .bin/go_ff ./fragments/api.go

      - name: run gin api
        run: ./.bin/go_ff &

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: install npm dependencies
        run: npm ci

      - name: bruno integration tests for gin api
        run: node --run api:bru:gin
